<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kurs design concepts</title>
    <style>
      :root {
        --bg: #f5f7f2;
        --surface: #ffffff;
        --surface-2: #eef2ec;
        --surface-3: #f9faf7;
        --text: #1e2620;
        --muted: #697267;
        --line: #dbe2d8;
        --primary: #215c45;
        --primary-2: #2f6f91;
        --accent: #b7791f;
        --danger: #b93645;
        --good: #2f7a4f;
        --shadow: 0 24px 70px rgba(31, 39, 34, 0.12);
        --radius: 8px;
        --sidebar: 248px;
        --font: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0) 34%),
          var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      svg {
        display: block;
      }

      .board {
        width: 1440px;
        min-height: 1000px;
        padding: 32px;
      }

      .concept-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 28px;
        margin-bottom: 22px;
      }

      .concept-kicker {
        margin: 0 0 8px;
        color: var(--primary);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.08;
      }

      .concept-note {
        max-width: 500px;
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .palette {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .swatch {
        width: 28px;
        height: 28px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 999px;
        background: var(--color);
      }

      .product-frame {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 20px;
        align-items: stretch;
      }

      .app-window {
        min-height: 852px;
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--line) 84%, #000 16%);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 24px;
        border-right: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface-3) 88%, var(--primary) 12%);
        padding: 22px 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 44px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: calc(var(--radius) + 2px);
        background: var(--primary);
        color: #fff;
        font-size: 19px;
        font-weight: 900;
      }

      .brand-title {
        display: grid;
        gap: 2px;
      }

      .brand-title strong {
        font-size: 17px;
      }

      .brand-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .role-chip {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        padding: 8px 11px;
        font-size: 12px;
        font-weight: 800;
      }

      .role-chip svg {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .nav {
        display: grid;
        gap: 6px;
      }

      .nav-item {
        min-height: 42px;
        display: flex;
        align-items: center;
        gap: 11px;
        border-radius: calc(var(--radius) - 1px);
        color: var(--muted);
        padding: 0 12px;
        font-size: 14px;
        font-weight: 760;
      }

      .nav-item svg {
        width: 19px;
        height: 19px;
        stroke-width: 2.1;
      }

      .nav-item.active {
        background: var(--primary);
        color: #fff;
      }

      .sidebar-foot {
        margin-top: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 14px;
      }

      .sidebar-foot strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .sidebar-foot span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        background: var(--bg);
      }

      .topbar {
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface) 92%, var(--bg) 8%);
        padding: 0 26px;
      }

      .topbar-title {
        display: grid;
        gap: 3px;
      }

      .topbar-title strong {
        font-size: 18px;
      }

      .topbar-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button,
      .user-pill {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) - 1px);
        background: var(--surface);
        color: var(--text);
      }

      .icon-button {
        width: 38px;
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
      }

      .user-pill {
        gap: 10px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 800;
      }

      .avatar {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        font-size: 11px;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 284px;
        gap: 18px;
        padding: 22px;
      }

      .left-stack,
      .right-stack {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .lesson-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: center;
        border: 1px solid color-mix(in srgb, var(--primary) 18%, var(--line) 82%);
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--surface) 86%, var(--primary) 14%), var(--surface) 64%),
          var(--surface);
        padding: 22px;
      }

      .lesson-hero h2 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.08;
      }

      .lesson-hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .tag {
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        padding: 0 10px;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.primary {
        border-color: color-mix(in srgb, var(--primary) 38%, var(--line));
        color: var(--primary);
      }

      .hero-actions {
        display: grid;
        gap: 10px;
        width: 164px;
      }

      .btn {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--primary);
        border-radius: calc(var(--radius) - 1px);
        background: var(--primary);
        color: #fff;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 850;
      }

      .btn.secondary {
        border-color: var(--line);
        background: var(--surface);
        color: var(--primary);
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric,
      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .metric {
        display: grid;
        gap: 8px;
        padding: 15px;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .metric strong {
        font-size: 25px;
        line-height: 1;
      }

      .metric small {
        color: var(--muted);
        font-size: 12px;
      }

      .panel {
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
      }

      .panel-head h3 {
        margin: 0;
        font-size: 16px;
      }

      .panel-head span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .journal {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .journal th,
      .journal td {
        border-bottom: 1px solid var(--line);
        border-right: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
        padding: 10px 8px;
        text-align: center;
        vertical-align: middle;
      }

      .journal th:first-child,
      .journal td:first-child {
        width: 190px;
        text-align: left;
      }

      .journal th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .journal th strong {
        display: block;
        color: var(--text);
        font-size: 15px;
      }

      .student-name {
        display: grid;
        gap: 3px;
      }

      .student-name strong {
        font-size: 13px;
      }

      .student-name span {
        color: var(--muted);
        font-size: 11px;
      }

      .mark {
        min-width: 32px;
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .mark.good {
        border-color: color-mix(in srgb, var(--good) 30%, var(--line));
        background: color-mix(in srgb, var(--good) 13%, var(--surface));
        color: var(--good);
      }

      .mark.warn {
        border-color: color-mix(in srgb, var(--accent) 34%, var(--line));
        background: color-mix(in srgb, var(--accent) 14%, var(--surface));
        color: var(--accent);
      }

      .mark.bad {
        border-color: color-mix(in srgb, var(--danger) 32%, var(--line));
        background: color-mix(in srgb, var(--danger) 12%, var(--surface));
        color: var(--danger);
      }

      .signal-list,
      .homework-list,
      .payment-list {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .signal,
      .homework,
      .payment-row {
        display: grid;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) - 1px);
        background: var(--surface-3);
        padding: 12px;
      }

      .signal-top,
      .payment-row {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }

      .signal strong,
      .homework strong,
      .payment-row strong {
        font-size: 13px;
      }

      .signal span,
      .homework span,
      .payment-row span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .status {
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0 8px;
        font-size: 11px;
        font-weight: 900;
      }

      .status.bad {
        background: color-mix(in srgb, var(--danger) 13%, var(--surface));
        color: var(--danger);
      }

      .status.warn {
        background: color-mix(in srgb, var(--accent) 15%, var(--surface));
        color: var(--accent);
      }

      .status.good {
        background: color-mix(in srgb, var(--good) 14%, var(--surface));
        color: var(--good);
      }

      .mobile-preview {
        min-height: 852px;
        display: grid;
        align-content: center;
        justify-items: center;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--surface) 72%, var(--primary) 28%), var(--surface-2)),
          var(--surface-2);
        box-shadow: var(--shadow);
      }

      .phone {
        width: 250px;
        min-height: 640px;
        overflow: hidden;
        border: 8px solid color-mix(in srgb, var(--text) 82%, #000 18%);
        border-radius: 34px;
        background: var(--bg);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      }

      .phone-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 56px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        padding: 0 15px;
      }

      .phone-title {
        display: grid;
        gap: 1px;
      }

      .phone-title strong {
        font-size: 14px;
      }

      .phone-title span {
        color: var(--muted);
        font-size: 11px;
      }

      .phone-content {
        display: grid;
        gap: 10px;
        padding: 13px;
      }

      .phone-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 12px;
      }

      .phone-card h4 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .phone-card p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .phone-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .phone-action {
        min-height: 66px;
        display: grid;
        place-items: center;
        gap: 5px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--primary);
        font-size: 11px;
        font-weight: 900;
        text-align: center;
      }

      .phone-action svg {
        width: 19px;
        height: 19px;
      }

      .bottom-nav {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        border-top: 1px solid var(--line);
        background: var(--surface);
        padding: 8px;
      }

      .bottom-nav div {
        display: grid;
        justify-items: center;
        gap: 4px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 800;
      }

      .bottom-nav svg {
        width: 18px;
        height: 18px;
      }

      .variant-2 {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --surface-2: #edf2f4;
        --surface-3: #f9fbfb;
        --text: #202629;
        --muted: #687277;
        --line: #d8e0e3;
        --primary: #275f6a;
        --primary-2: #4c6a95;
        --accent: #a76622;
        --danger: #bb3d4a;
        --good: #2f7857;
        --radius: 4px;
        --sidebar: 232px;
        --shadow: 0 20px 58px rgba(33, 43, 49, 0.12);
      }

      .variant-2 .app-window,
      .variant-2 .mobile-preview {
        box-shadow: none;
      }

      .variant-2 .content {
        gap: 14px;
        padding: 18px;
      }

      .variant-2 .lesson-hero h2 {
        font-size: 27px;
      }

      .variant-2 .journal th,
      .variant-2 .journal td {
        padding: 8px 7px;
      }

      .variant-3 {
        --bg: #f7f7f1;
        --surface: #ffffff;
        --surface-2: #edf3e8;
        --surface-3: #fbfbf5;
        --text: #242620;
        --muted: #6b6f66;
        --line: #e1e1d4;
        --primary: #3b6846;
        --primary-2: #6b6fa8;
        --accent: #c0644b;
        --danger: #b54350;
        --good: #418a5c;
        --radius: 12px;
        --sidebar: 242px;
        --shadow: 0 26px 70px rgba(49, 52, 39, 0.14);
      }

      .variant-3 .lesson-hero {
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--surface) 80%, var(--accent) 20%), var(--surface) 64%),
          var(--surface);
      }

      .variant-3 .brand-mark {
        border-radius: 14px;
      }

      .variant-4 {
        --bg: #f5f7f9;
        --surface: #ffffff;
        --surface-2: #eaf0f0;
        --surface-3: #f9fbfb;
        --text: #182225;
        --muted: #66727a;
        --line: #d7e0e2;
        --primary: #174c52;
        --primary-2: #7b5c9f;
        --accent: #b98327;
        --danger: #b8384a;
        --good: #2d7853;
        --radius: 8px;
        --sidebar: 260px;
        --shadow: 0 24px 66px rgba(20, 33, 38, 0.15);
      }

      .variant-4 .sidebar {
        border-right: 0;
        background: #142328;
        color: #fff;
      }

      .variant-4 .sidebar .brand-title span,
      .variant-4 .sidebar .role-chip,
      .variant-4 .sidebar .nav-item,
      .variant-4 .sidebar .sidebar-foot span {
        color: rgba(255, 255, 255, 0.68);
      }

      .variant-4 .sidebar .role-chip,
      .variant-4 .sidebar .sidebar-foot {
        border-color: rgba(255, 255, 255, 0.13);
        background: rgba(255, 255, 255, 0.07);
      }

      .variant-4 .sidebar .nav-item.active {
        background: #ffffff;
        color: var(--primary);
      }

      .variant-4 .brand-mark {
        background: #ffffff;
        color: var(--primary);
      }

      .variant-5 {
        --bg: #f8f8f6;
        --surface: #ffffff;
        --surface-2: #eeeeea;
        --surface-3: #fbfbf9;
        --text: #191d1b;
        --muted: #696e69;
        --line: #ddddda;
        --primary: #234f3c;
        --primary-2: #6a5b9d;
        --accent: #ba6f30;
        --danger: #ad3947;
        --good: #2d7651;
        --radius: 2px;
        --sidebar: 220px;
        --shadow: 0 18px 46px rgba(20, 24, 22, 0.1);
      }

      .variant-5 .brand-mark,
      .variant-5 .btn,
      .variant-5 .nav-item,
      .variant-5 .panel,
      .variant-5 .metric,
      .variant-5 .lesson-hero,
      .variant-5 .phone-card,
      .variant-5 .phone-action {
        border-radius: var(--radius);
      }

      .variant-5 .lesson-hero {
        background: var(--surface);
        border-left: 5px solid var(--primary);
      }

      .variant-5 .tag,
      .variant-5 .mark,
      .variant-5 .status {
        border-radius: 2px;
      }
    </style>
  </head>
