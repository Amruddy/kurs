<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kurs symmetry system options</title>
    <style>
      :root {
        --page: #f5f7f4;
        --surface: #ffffff;
        --surface-soft: #f8faf7;
        --nav: #edf4f0;
        --nav-hover: #ffffff;
        --line: #d7e0da;
        --line-strong: #c6d3cc;
        --text: #16201b;
        --muted: #65736c;
        --primary: #0f5a45;
        --primary-dark: #0b4435;
        --primary-soft: #e4f2ec;
        --blue: #245f84;
        --blue-soft: #e7f0f6;
        --amber: #b7791f;
        --amber-soft: #f7ead8;
        --red: #b93645;
        --red-soft: #f7e6e9;
        --green: #2d7a52;
        --green-soft: #e5f2eb;
        --violet: #6857a2;
        --violet-soft: #ece8f8;
        --shadow: 0 20px 52px rgba(27, 38, 32, 0.11);
        --radius: 8px;
        --gap: 14px;
        --sidebar: 250px;
        --hero-height: 184px;
        --card-height: 112px;
        --panel-head: 50px;
        --font: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--text);
        font-family: var(--font);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      svg {
        display: block;
      }

      .density-compact {
        --gap: 10px;
        --sidebar: 230px;
        --hero-height: 152px;
        --card-height: 92px;
        --panel-head: 44px;
        --radius: 5px;
        --shadow: 0 14px 36px rgba(27, 38, 32, 0.08);
      }

      .density-spacious {
        --gap: 18px;
        --sidebar: 266px;
        --hero-height: 210px;
        --card-height: 128px;
        --panel-head: 56px;
        --radius: 10px;
      }

      .tone-slate {
        --page: #f5f7f8;
        --nav: #eaf0f1;
        --primary: #245f68;
        --primary-dark: #184852;
        --primary-soft: #e5f1f3;
        --blue: #315d8c;
        --blue-soft: #e8f0f8;
        --violet: #6a5b9d;
        --violet-soft: #ece9f6;
      }

      .tone-warm {
        --page: #f7f7f2;
        --nav: #eef2e8;
        --primary: #3d6746;
        --primary-dark: #2e4f36;
        --primary-soft: #e9f2e8;
        --blue: #3f6d88;
        --blue-soft: #e9f1f5;
        --amber: #b46f2d;
        --amber-soft: #f7e8da;
      }

      .page {
        min-height: 100vh;
        padding: 22px;
      }

      .top {
        max-width: 1520px;
        min-height: 62px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin: 0 auto 16px;
      }

      .title {
        display: grid;
        gap: 5px;
      }

      .title span {
        color: var(--primary);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .title h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1;
      }

      .switches {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .segmented {
        display: inline-grid;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 4px;
      }

      .systems {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .roles {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .segmented button {
        min-height: 36px;
        border: 0;
        border-radius: calc(var(--radius) - 2px);
        background: transparent;
        color: var(--muted);
        padding: 0 12px;
        font-size: 13px;
        font-weight: 900;
      }

      .segmented button.active {
        background: var(--primary);
        color: #fff;
      }

      .shell {
        max-width: 1520px;
        min-height: 842px;
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        margin: 0 auto;
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 22px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #f4f8f6, var(--nav));
        padding: 20px 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: var(--radius);
        background: var(--primary);
        color: #fff;
        font-size: 18px;
        font-weight: 900;
      }

      .brand strong {
        display: block;
        font-size: 17px;
      }

      .brand span {
        color: var(--muted);
        font-size: 12px;
      }

      .role-chip {
        width: fit-content;
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        padding: 0 12px;
        font-size: 12px;
        font-weight: 900;
      }

      .nav {
        display: grid;
        gap: 6px;
        align-content: start;
      }

      .nav button {
        min-height: 42px;
        display: flex;
        align-items: center;
        gap: 11px;
        border: 1px solid transparent;
        border-radius: calc(var(--radius) - 2px);
        background: transparent;
        color: var(--muted);
        padding: 0 12px;
        text-align: left;
        font-size: 14px;
        font-weight: 850;
      }

      .nav button:hover {
        border-color: var(--line);
        background: var(--nav-hover);
        color: var(--text);
      }

      .nav button.active {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      .role-chip svg,
      .nav svg,
      .icon-button svg,
      .bottom-nav svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .today {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 14px;
      }

      .today strong {
        display: block;
        margin-bottom: 10px;
      }

      .today div {
        display: flex;
        justify-content: space-between;
        min-height: 28px;
        color: var(--muted);
        font-size: 13px;
      }

      .main {
        min-width: 0;
        display: grid;
        grid-template-rows: 66px 1fr;
        background: var(--page);
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        padding: 0 22px;
      }

      .bar-title {
        display: grid;
        gap: 3px;
      }

      .bar-title strong {
        font-size: 18px;
      }

      .bar-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .bar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button,
      .user {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) - 2px);
        background: var(--surface);
        color: var(--text);
      }

      .icon-button {
        width: 38px;
      }

      .user {
        gap: 10px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 900;
      }

      .avatar {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        font-size: 11px;
        font-weight: 900;
      }

      .canvas {
        min-width: 0;
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: var(--gap);
        align-items: stretch;
        padding: var(--gap);
      }

      .canvas > * {
        min-width: 0;
      }

      .hero,
      .panel,
      .metric,
      .empty-state {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .hero {
        grid-column: span 8;
        min-height: var(--hero-height);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 170px;
        gap: var(--gap);
        align-items: center;
        padding: 22px;
      }

      .hero h2 {
        margin: 0 0 12px;
        font-size: clamp(30px, 2.5vw, 38px);
        line-height: 1.02;
      }

      .hero-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .hero-actions {
        display: grid;
        gap: 10px;
      }

      .top-panel {
        grid-column: span 4;
        min-height: var(--hero-height);
        height: 100%;
      }

      .metrics {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: var(--gap);
      }

      .metric {
        min-height: var(--card-height);
        display: grid;
        align-content: center;
        padding: 14px;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .metric strong {
        display: block;
        margin: 8px 0 5px;
        font-size: 28px;
        line-height: 1;
      }

      .metric small {
        color: var(--muted);
        font-size: 12px;
      }

      .main-panel {
        grid-column: span 8;
        min-height: 324px;
        overflow: hidden;
      }

      .side-panel {
        grid-column: span 4;
        min-height: 324px;
        overflow: hidden;
      }

      .panel-head {
        min-height: var(--panel-head);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 0 16px;
      }

      .panel-head h3 {
        margin: 0;
        font-size: 16px;
      }

      .panel-head span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .row-card {
        min-height: 48px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) - 2px);
        background: var(--surface-soft);
        padding: 10px 12px;
      }

      .row-card strong {
        display: block;
        margin-bottom: 2px;
        font-size: 13px;
      }

      .row-card span {
        color: var(--muted);
        font-size: 12px;
      }

      .btn {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--primary);
        border-radius: calc(var(--radius) - 2px);
        background: var(--primary);
        color: #fff;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 900;
      }

      .btn:hover {
        background: var(--primary-dark);
      }

      .btn.secondary {
        border-color: var(--line-strong);
        background: var(--surface);
        color: var(--primary);
      }

      .btn.secondary:hover {
        border-color: var(--primary);
        background: var(--primary-soft);
      }

      .btn.ghost {
        border-color: transparent;
        background: transparent;
        color: var(--primary);
      }

      .chip,
      .status,
      .mark {
        min-height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 9px;
        font-size: 12px;
        font-weight: 900;
      }

      .chip {
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
      }

      .chip.primary {
        border-color: #b9d5c9;
        background: var(--primary-soft);
        color: var(--primary);
      }

      .status.good {
        background: var(--green-soft);
        color: var(--green);
      }

      .status.warn {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .status.bad {
        background: var(--red-soft);
        color: var(--red);
      }

      .status.neutral {
        background: var(--blue-soft);
        color: var(--blue);
      }

      .status.violet {
        background: var(--violet-soft);
        color: var(--violet);
      }

      .mark {
        min-width: 30px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .mark.good {
        border-color: #b9d8c9;
        background: var(--green-soft);
        color: var(--green);
      }

      .mark.warn {
        border-color: #e7cfa9;
        background: var(--amber-soft);
        color: var(--amber);
      }

      .mark.bad {
        border-color: #edbdc5;
        background: var(--red-soft);
        color: var(--red);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 10px;
        text-align: left;
        vertical-align: middle;
        font-size: 13px;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .journal th,
      .journal td {
        text-align: center;
      }

      .journal th:first-child,
      .journal td:first-child {
        width: 190px;
        text-align: left;
      }

      .date strong,
      .student strong {
        display: block;
      }

      .date span,
      .student span {
        color: var(--muted);
        font-size: 11px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line-strong);
        border-radius: calc(var(--radius) - 2px);
        background: var(--surface);
        color: var(--text);
        padding: 0 10px;
      }

      textarea {
        min-height: 82px;
        padding-top: 10px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus,
      button:focus-visible {
        outline: 3px solid rgba(15, 90, 69, 0.18);
        outline-offset: 2px;
      }

      .empty-state {
        min-height: 260px;
        display: grid;
        place-items: center;
        padding: 26px;
        text-align: center;
      }

      .empty-state h3 {
        margin: 0 0 8px;
      }

      .empty-state p {
        max-width: 360px;
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.45;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 20;
        min-width: 260px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 14px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(16px);
        transition: 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast strong {
        display: block;
        margin-bottom: 4px;
      }

      .toast span {
        color: var(--muted);
        font-size: 13px;
      }

      .bottom-nav {
        display: none;
      }

      @media (max-width: 980px) {
        .page {
          padding: 14px;
          padding-bottom: 84px;
        }

        .top {
          align-items: stretch;
          flex-direction: column;
        }

        .switches {
          justify-content: stretch;
        }

        .segmented {
          width: 100%;
        }

        .shell {
          display: block;
          min-height: auto;
        }

        .sidebar {
          display: none;
        }

        .main {
          display: block;
        }

        .canvas {
          grid-template-columns: 1fr;
        }

        .hero,
        .top-panel,
        .metrics,
        .main-panel,
        .side-panel {
          grid-column: 1;
        }

        .hero,
        .metrics,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .bottom-nav {
          position: fixed;
          left: 14px;
          right: 14px;
          bottom: 14px;
          z-index: 15;
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 4px;
          border: 1px solid var(--line);
          border-radius: var(--radius);
          background: var(--surface);
          box-shadow: var(--shadow);
          padding: 6px;
        }

        .bottom-nav button {
          min-height: 50px;
          display: grid;
          place-items: center;
          gap: 2px;
          border: 0;
          border-radius: calc(var(--radius) - 2px);
          background: transparent;
          color: var(--muted);
          font-size: 10px;
          font-weight: 900;
        }

        .bottom-nav button.active {
          background: var(--primary);
          color: #fff;
        }
      }
    </style>
  </head>
  <body>

    <main class="page">
      <header class="top">
        <div class="title">
          <span>Симметрия на всех MVP-страницах</span>
          <h1 id="systemTitle">Система A</h1>
        </div>
        <div class="switches">
          <div class="segmented systems" id="systemSwitch"></div>
          <div class="segmented roles" id="roleSwitch"></div>
        </div>
      </header>

      <section class="shell">
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-mark">ك</div>
            <div>
              <strong>Kurs</strong>
              <span>учет таджвида</span>
            </div>
          </div>
          <div class="role-chip" id="roleChip"></div>
          <nav class="nav" id="sideNav"></nav>
          <div class="today">
            <strong>Сегодня</strong>
            <div><span>18:30</span><span>Нур</span></div>
            <div><span>20:00</span><span>Ихсан</span></div>
            <div><span>Оплата</span><span>3</span></div>
          </div>
        </aside>

        <section class="main">
          <header class="bar">
            <div class="bar-title">
              <strong id="pageTitle"></strong>
              <span id="pagePath"></span>
            </div>
            <div class="bar-actions">
              <button class="icon-button js-action" data-message="Сигналы"><svg><use href="#i-bell"></use></svg></button>
              <div class="user"><span class="avatar">АС</span><span id="userName">Айша С.</span></div>
